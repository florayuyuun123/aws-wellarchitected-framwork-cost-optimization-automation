AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated Cost Governance Project - Wasteful Infrastructure. WARNING: THIS WILL INCUR COSTS IF LEFT RUNNING.'

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String
    Default: flo-tech
  InstanceType:
    Description: WebServer EC2 instance type (deliberately somewhat oversized)
    Type: String
    Default: t3.medium
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.medium
      - t3.large

Resources:
  # 1. Idle EC2 Instance
  IdleEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId # Uses SSM parameter to get latest Amazon Linux 2 AMI
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IdleInstance
        - Key: Purpose
          Value: CostGovernanceDemo
        - Key: Status
          Value: Idle

  # 2. Unattached EBS Volume
  UnattachedEBSVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: 20
      AvailabilityZone: !GetAtt IdleEC2Instance.AvailabilityZone
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-OrphanedVolume
        - Key: Purpose
          Value: CostGovernanceDemo
        - Key: Status
          Value: Unattached

  # 3. An S3 Bucket without Lifecycle Policies (to demonstrate later optimization)
  InefficientS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvironmentName}-inefficient-logs-${AWS::AccountId}-${AWS::Region}
      Tags:
        - Key: Purpose
          Value: CostGovernanceDemo

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

Outputs:
  InstanceId:
    Description: The ID of the idle EC2 instance
    Value: !Ref IdleEC2Instance
  VolumeId:
    Description: The ID of the unattached EBS volume
    Value: !Ref UnattachedEBSVolume
  BucketName:
    Description: The name of the S3 bucket
    Value: !Ref InefficientS3Bucket
